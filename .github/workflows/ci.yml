name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://user:password@localhost:5432/wildcat_copilot
      GOOGLE_OAUTH_CLIENT_ID: ci-placeholder
      GOOGLE_OAUTH_CLIENT_SECRET: ci-placeholder
      AUTH_SECRET: ci-placeholder-secret-value-that-is-long-enough
      OBJECT_STORAGE_BUCKET: ci-placeholder
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ACCESS_KEY_ID: ci-placeholder
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-placeholder
      LLM_PROVIDER_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit and integration tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DATABASE_URL: postgres://user:password@localhost:5432/wildcat_copilot
      GOOGLE_OAUTH_CLIENT_ID: ci-placeholder
      GOOGLE_OAUTH_CLIENT_SECRET: ci-placeholder
      AUTH_SECRET: ci-placeholder-secret-value-that-is-long-enough
      OBJECT_STORAGE_BUCKET: ci-placeholder
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ACCESS_KEY_ID: ci-placeholder
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-placeholder
      LLM_PROVIDER_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
