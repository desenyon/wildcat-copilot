name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wildcat
          POSTGRES_PASSWORD: wildcat_dev_only
          POSTGRES_DB: wildcat_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wildcat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://wildcat:wildcat_dev_only@localhost:5432/wildcat_copilot
      TEST_DATABASE_URL: postgres://wildcat:wildcat_dev_only@localhost:5432/wildcat_copilot
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dW5pZmllZC1taW5ub3ctOC5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      APP_SECRET: ci-placeholder-secret-value-that-is-long-enough
      OBJECT_STORAGE_BUCKET: ci-placeholder
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ACCESS_KEY_ID: ci-placeholder
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-placeholder
      LLM_PROVIDER_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Apply database migrations
        run: npm run db:migrate

      - name: Unit and integration tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    env:
      DATABASE_URL: postgres://user:password@localhost:5432/wildcat_copilot
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_dW5pZmllZC1taW5ub3ctOC5jbGVyay5hY2NvdW50cy5kZXYk
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      APP_SECRET: ci-placeholder-secret-value-that-is-long-enough
      OBJECT_STORAGE_BUCKET: ci-placeholder
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_ACCESS_KEY_ID: ci-placeholder
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ci-placeholder
      LLM_PROVIDER_API_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e
